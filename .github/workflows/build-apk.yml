name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract
        run: unzip habit-passport-slim.zip -d src

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Fix Gradle
        working-directory: src/habit-passport-project/android
        run: |
          sed -i 's/gradle:8.7.2/gradle:8.9.1/' build.gradle
          sed -i 's/compileSdkVersion = 35/compileSdkVersion = 36/' variables.gradle
          sed -i 's/targetSdkVersion = 35/targetSdkVersion = 36/' variables.gradle
          sed -i 's/minSdkVersion = 23/minSdkVersion = 24/' variables.gradle

      - name: Install
        working-directory: src/habit-passport-project
        run: npm ci

      - name: Sync
        working-directory: src/habit-passport-project
        run: npx cap sync android

      - name: Build
        working-directory: src/habit-passport-project/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Find APK
        run: find src -name "app-debug.apk" -exec cp {} app.apk \;

      - uses: actions/upload-artifact@v4
        with:
          name: HabitPassport
          path: app.apk
