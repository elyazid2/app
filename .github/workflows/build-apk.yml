name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip "habit-passport-slim.zip" -d extracted

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: extracted/habit-passport-project
        run: npm ci

      - name: Sync Capacitor
        working-directory: extracted/habit-passport-project
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: extracted/habit-passport-project/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: extracted/habit-passport-project/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: habit-passport-debug
          path: extracted/habit-passport-project/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
